<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记账 - 简易记账软件</title>
    <meta name="api-base" content="">
    <script src="https://cdn.tailwindcss.com/3.3.3"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#10B981',
                        danger: '#EF4444',
                        neutral: '#6B7280',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen" data-page="transactions">
    <header class="sticky top-0 z-50 glass-effect border-b border-gray-200">
        <div class="container mx-auto px-4 py-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div class="flex items-center space-x-2">
                <i class="fas fa-wallet text-primary text-2xl"></i>
                <h1 class="text-xl font-bold text-gray-800">简易记账</h1>
            </div>
            <nav class="app-nav flex flex-wrap gap-2">
                <a href="index.html" class="nav-link">总览</a>
                <a href="transactions.html" class="nav-link is-active">记账/交易</a>
                <a href="analytics.html" class="nav-link">统计分析</a>
                <a href="settings.html" class="nav-link">预算/导出/备份</a>
            </nav>
            <div class="flex items-center space-x-2">
                <span id="currentUserDisplay" class="text-sm text-gray-600">游客</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-1 animate-fadeIn" style="animation-delay: 0.1s;">
                <div class="bg-white rounded-xl p-6 card-shadow h-full">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">添加记账</h3>
                    <div class="flex space-x-2 mb-6">
                        <button id="expenseBtn" class="flex-1 py-3 rounded-lg bg-danger text-white font-medium transition-custom">
                            <i class="fas fa-minus-circle mr-2"></i>支出
                        </button>
                        <button id="incomeBtn" class="flex-1 py-3 rounded-lg bg-gray-100 text-gray-600 font-medium transition-custom">
                            <i class="fas fa-plus-circle mr-2"></i>收入
                        </button>
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-1">金额</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">¥</span>
                            <input type="number" id="amountInput" class="w-full pl-8 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus" placeholder="0.00" step="0.01" min="0">
                        </div>
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                        <input type="date" id="dateInput" class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-3">分类</label>
                        <div id="categoryContainer" class="grid grid-cols-4 gap-2"></div>
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                        <textarea id="noteInput" rows="2" class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus" placeholder="添加备注..."></textarea>
                    </div>
                    <button id="saveBtn" class="w-full py-3 bg-primary text-white font-medium rounded-lg transition-custom hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        保存记录
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 animate-fadeIn" style="animation-delay: 0.2s;">
                <div class="bg-white rounded-xl p-6 card-shadow h-full">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-semibold text-gray-800">最近交易</h3>
                        <button id="viewAllBtn" class="text-primary text-sm hover:underline transition-custom">查看全部</button>
                    </div>
                    <div id="transactionList" class="space-y-4 min-h-[32rem] max-h-[40rem] overflow-y-auto custom-scrollbar">
                        <div class="text-center py-10 text-gray-500">
                            <i class="fas fa-file-invoice-dollar text-4xl mb-3"></i>
                            <p>暂无交易记录</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="transactionModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl p-6 max-w-lg w-full mx-4 card-shadow animate-fadeIn">
            <div id="modalContent" class="space-y-4"></div>
            <div class="mt-6 flex flex-wrap gap-3 justify-end">
                <button id="editTransactionBtn" class="px-4 py-2 border border-primary text-primary rounded-lg transition-custom hover:bg-primary hover:text-white">编辑</button>
                <button id="deleteTransactionBtn" class="px-4 py-2 border border-danger text-danger rounded-lg transition-custom hover:bg-danger hover:text-white">删除</button>
                <button id="closeModalBtn" class="px-4 py-2 border border-gray-300 rounded-lg bg-white hover:bg-gray-50">关闭</button>
            </div>
        </div>
    </div>

    <div id="allTransactionsModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl p-6 max-w-4xl w-full mx-4 card-shadow animate-fadeIn">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-gray-800">全部交易记录</h3>
                <button id="closeAllTransactionsBtn" class="text-gray-500 hover:text-gray-700 transition-custom"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-3 mb-4">
                <div class="flex items-center gap-3 flex-wrap">
                    <input id="allSearchInput" class="flex-1 px-3 py-2 border rounded" placeholder="按备注或分类搜索...">
                    <select id="allTypeFilter" class="px-3 py-2 border rounded">
                        <option value="all">全部</option>
                        <option value="income">仅收入</option>
                        <option value="expense">仅支出</option>
                    </select>
                </div>
                <div class="flex items-center gap-3 flex-wrap">
                    <div class="flex items-center gap-2 flex-wrap">
                        <button class="range-btn px-3 py-2 border rounded" data-range="day">日</button>
                        <button class="range-btn px-3 py-2 border rounded" data-range="week">周</button>
                        <button class="range-btn px-3 py-2 border rounded" data-range="month">月</button>
                        <button class="range-btn px-3 py-2 border rounded" data-range="quarter">季</button>
                        <button class="range-btn px-3 py-2 border rounded" data-range="year">年</button>
                        <button class="range-btn px-3 py-2 border rounded" data-range="custom">自定义</button>
                    </div>
                    <div class="flex items-center gap-2 flex-wrap">
                        <input type="date" id="customStart" class="px-3 py-2 border rounded">
                        <span class="text-gray-500">至</span>
                        <input type="date" id="customEnd" class="px-3 py-2 border rounded">
                        <button id="applyCustomRange" class="px-3 py-2 border rounded bg-gray-100">应用</button>
                    </div>
                </div>
            </div>
            <div id="allTransactionsList" class="max-h-[52vh] overflow-y-auto custom-scrollbar space-y-2"></div>
            <div class="flex items-center justify-between mt-4">
                <div class="text-sm text-gray-600"><span id="paginationInfo">第 1/1 页</span></div>
                <div class="flex items-center gap-2">
                    <button id="prevPageBtn" class="px-3 py-2 border rounded">上一页</button>
                    <button id="nextPageBtn" class="px-3 py-2 border rounded">下一页</button>
                    <select id="pageSizeSelect" class="px-3 py-2 border rounded">
                        <option value="10">每页 10 条</option>
                        <option value="20">每页 20 条</option>
                        <option value="50">每页 50 条</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
